<!doctype html>
<html lang='fr'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width,initial-scale=1' />
  <title>Maths 4e — Cours + Quiz (inline)</title>
  <meta name='description' content='Version claire + cours détaillés, scripts inline (diagnostic).'/>
  <link rel='stylesheet' href='./style.css'/>
</head>
<body>
  <noscript>
    <div style='margin:16px;padding:12px;background:#fff3cd;border:1px solid #ffeeba;border-radius:12px;color:#856404;'>
      Cette application nécessite JavaScript pour fonctionner.
    </div>
  </noscript>
  <div id='root'></div>

  <!-- React UMD + Babel, avec fallback jsDelivr si unpkg est bloqué -->
  <script src='https://unpkg.com/react@18/umd/react.production.min.js' onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'"></script>
  <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js' onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'"></script>
  <script src='https://unpkg.com/@babel/standalone/babel.min.js' onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'"></script>

  <!-- Petite vérification si les CDN sont bloqués -->
  <script>
    window.addEventListener('DOMContentLoaded', function(){
      setTimeout(function(){
        var root = document.getElementById('root');
        if (!window.React || !window.ReactDOM) {
          root.innerHTML = '<div style="margin:16px;padding:12px;background:#fff3cd;border:1px solid #ffeeba;border-radius:12px;color:#856404;">Impossible de charger React depuis le CDN (réseau/proxy).<br>Solutions :<ul><li>Vérifie ta connexion Internet / débloque les CDN.</li><li>Je peux te fournir une version “bundle local” sans CDN.</li></ul></div>';
        }
      }, 800);
    });
  </script>

  <!-- App inline (JSX) -->
  <script type='text/babel' data-presets='react,env'>
// --- App inline (JSX) ---
const { useState, useMemo, useEffect } = React;
const THEMES = [
  { key:"thales", title:"Théorème de Thalès", color:"#2563eb" },
  { key:"pythagore", title:"Théorème de Pythagore", color:"#16a34a" },
  { key:"litteral", title:"Calculs littéraux", color:"#f59e0b" },
  { key:"fractions", title:"Fractions", color:"#d946ef" },
  { key:"proportion", title:"Proportionnalité", color:"#0ea5e9" },
  { key:"mesures", title:"Grandeurs & mesures", color:"#ea580c" }
];
function ThalesSVG(){return (<svg className='diagram' viewBox='0 0 260 180'><polygon points='30,150 220,150 90,30' fill='none' stroke='#1f2937' strokeWidth='2'/><line x1='60' y1='150' x2='120' y2='90' stroke='#2563eb' strokeWidth='3'/><line x1='90' y1='30' x2='120' y2='90' stroke='#2563eb' strokeWidth='3'/><line x1='120' y1='90' x2='180' y2='90' stroke='#2563eb' strokeWidth='3'/><text x='24' y='165' fill='#0f172a' fontSize='12'>A</text><text x='222' y='165' fill='#0f172a' fontSize='12'>B</text><text x='86' y='22' fill='#0f172a' fontSize='12'>C</text><text x='56' y='165' fill='#0f172a' fontSize='12'>M</text><text x='184' y='96' fill='#0f172a' fontSize='12'>N</text><text x='130' y='86' fill='#0f172a' fontSize='11'>MN // BC</text></svg>);} 
function PythagoreSVG(){return (<svg className='diagram' viewBox='0 0 260 180'><polygon points='40,150 200,150 40,40' fill='none' stroke='#1f2937' strokeWidth='2'/><rect x='40' y='130' width='20' height='20' fill='#16a34a' opacity='0.25'/><text x='30' y='165' fill='#0f172a' fontSize='12'>A</text><text x='204' y='165' fill='#0f172a' fontSize='12'>B</text><text x='28' y='40' fill='#0f172a' fontSize='12'>C</text><text x='110' y='160' fill='#0f172a' fontSize='12'>AB (hypoténuse)</text></svg>);} 
const COURSES = { thales:{ intro:"Dans un triangle ABC, si M ∈ [AB], N ∈ [AC] et (MN) // (BC), alors on obtient des triangles semblables (AMN et ABC) : les longueurs correspondantes sont proportionnelles.", prereq:["Notion de segments parallèles ; triangles semblables (idée intuitive).","Calcul de rapports, fractions, simplifications."], ideas:["Rapports égaux : AM/AB = AN/AC = MN/BC.","Réciproque : si AM/AB = AN/AC alors (MN) // (BC) (sous conditions d’alignement).","Applications : calculs de longueurs, agrandissements/réductions, preuves de parallélisme."], method:["1) Identifier la configuration : points M sur [AB], N sur [AC] et (MN)//(BC).","2) Écrire l’égalité des rapports correspondants (petit/grand triangle).","3) Remplacer par les valeurs connues, résoudre l’équation de proportionnalité.","4) Vérifier l’unité et la cohérence (valeur attendue plus petite dans le petit triangle)."], examples:[{title:"Exemple 1 — Longueur manquante",steps:["Dans ABC, (MN)//(BC). AB=12, AM=9, BC=20. Calculer MN.","Rapport : AM/AB = MN/BC."],solution:["AM/AB=9/12=3/4 ⇒ MN=3/4×20=15 cm."]},{title:"Exemple 2 — Réciproque",steps:["AM/AB=AN/AC=2/5 avec M∈[AB], N∈[AC]."],solution:["Par réciproque, (MN) ∥ (BC)."]}], pitfalls:["Respecter les correspondances (AM↔AB ; AN↔AC ; MN↔BC).","Alignement requis pour la réciproque."], recap:["Thalès = égalité de rapports et proportionnalité.","Liens: agrandissements/échelles."], program:["Cycle 4 — Espace & géométrie : Thalès ; compétences : Modéliser, Raisonner, Calculer."] }, pythagore:{ intro:"Dans un triangle rectangle, le carré de l’hypoténuse est égal à la somme des carrés des deux autres côtés ; réciproque/contraposée pour tester si un triangle est rectangle.", prereq:["Repérer l’angle droit ; identifier l’hypoténuse.","Carrés et racines carrées."], ideas:["Direct : c²=a²+b²","Réciproque : si c²=a²+b² alors rectangle","Contraposée : si c²≠a²+b² alors pas rectangle"], method:["1) Identifier l’hypoténuse.","2) Appliquer la bonne relation.","3) Extraire la racine et conclure (unité)."], examples:[{title:"Exemple 1 — Longueur manquante",steps:["AB=3, AC=4, angle droit en A → BC?"],solution:["BC²=9+16=25 ⇒ BC=5"]},{title:"Exemple 2 — Tester rectangle",steps:["7,24,25 ?"],solution:["7²+24²=25² ⇒ rectangle."]}], pitfalls:["Confusion sur l’hypoténuse (côté le plus long, en face de l’angle droit).","Oublier la racine à la fin."], recap:["Outil pour longueurs/angles droits.","Prépare la trigonométrie."], program:["Cycle 4 — Espace & géométrie : Pythagore ; compétences : Raisonner, Calculer, Communiquer."] }, litteral:{ intro:"Le calcul littéral généralise les calculs avec des lettres : réduire, développer, factoriser, substituer.", prereq:["Priorités ; distributivité.","Signes, fractions."], ideas:["Réduire : regrouper termes de même nature.","Développer : a(b+c)=ab+ac ; (a+b)(c+d)=ac+ad+bc+bd.","Factoriser : facteur commun ; (a+b)²…"], method:["1) Choisir l’objectif.","2) Appliquer les règles.","3) Simplifier et soigner l’écriture."], examples:[{title:"Exemple 1 — Réduire",steps:["3x+5−2x+1"],solution:["x+6"]},{title:"Exemple 2 — Développer",steps:["(2x−3)(x+4)"],solution:["2x²+5x−12"]},{title:"Exemple 3 — Factoriser",steps:["7x−21"],solution:["7(x−3)"]}], pitfalls:["Oublis dans le produit de binômes ; erreurs de signe."], recap:["Réduire, développer, factoriser : trois gestes complémentaires."], program:["Cycle 4 — Nombres & calculs : calcul littéral."] }, fractions:{ intro:"Fractions = parts/rapports ; dénominateur commun pour +/− ; × et ÷ (par l’inverse).", prereq:["PGCD/simplifications ; %"], ideas:["+/− : PPCM.","× : × numérateurs et dénominateurs (simplifier avant).","÷ : × par l’inverse."], method:["1) Préparer (PPCM/simplifier).","2) Calculer proprement.","3) Simplifier/convertir si utile."], examples:[{title:"Exemple 1 — Addition",steps:["3/4+1/6"],solution:["=11/12"]},{title:"Exemple 2 — Produit",steps:["(5/8)×(12/5)"],solution:["=3/2"]}], pitfalls:["Additionner les dénominateurs ; oublier de simplifier."], recap:["Toujours vérifier l’ordre de grandeur."], program:["Cycle 4 — Nombres & calculs : calcul fractionnaire."] }, proportion:{ intro:"Proportionnalité : même rapport. Outils : coefficient, passage à l’unité, produit en croix, droite par l’origine.", prereq:["Fractions/% ; lecture de tableaux/graphes"], ideas:["Tableau de proportionnalité.","k : y=kx.","Pourcentages, échelles, vitesses."], method:["1) Vérifier la proportionnalité.","2) Choisir unité/coef/croix.","3) Vérifier unité/ordre de grandeur."], examples:[{title:"Exemple 1 — Prix",steps:["6 kg→18 €. 2,5 kg ?"],solution:["k=3 ⇒ 7,5 €"]},{title:"Exemple 2 — Échelle",steps:["1:25 000 ; 4 cm ?"],solution:["=1 km"]}], pitfalls:["Tableau non proportionnel ; +10% puis −10% ≠ 0%"], recap:["La droite de proportionnalité passe par l’origine."], program:["Cycle 4 — Fonctions/Proportionnalité."] }, mesures:{ intro:"Grandeurs (L, aires, volumes, vitesse…). Formules + conversions.", prereq:["Conversions ; priorités"], ideas:["Périmètres/aires (rectangle, triangle, disque)","Volumes (pavé, cylindre)","Grandeurs composées (v=d/t)"], method:["1) Identifier données/unité.","2) Convertir si besoin.","3) Formule → calcul → unité."], examples:[{title:"Exemple 1 — Aire disque",steps:["r=5 cm"],solution:["A=25π cm² (≈78,5)"]},{title:"Exemple 2 — Volume pavé",steps:["3×2×0,5 m"],solution:["V=3 m³"]}], pitfalls:["Confondre cm²/cm³ ; oublier conversions"], recap:["Toujours conclure avec l’unité."], program:["Cycle 4 — Grandeurs & mesures."] }
};
const BANK = { thales:[{q:"Dans ABC, (MN)//(BC). AB=8, AM=3, AC=10. AN = ?",choices:["3,75","4","2,5","5"],answer:0,why:"3/8=AN/10 ⇒ AN=3×10/8."},{q:"AB=12, AM=9, BC=20. MN ?",choices:["12","15","10","18"],answer:1,why:"9/12=MN/20 ⇒ MN=15."}], pythagore:[{q:"Rect. en A, AB=3, AC=4. BC?",choices:["5","6","7","4,5"],answer:0,why:"3²+4²=5²."},{q:"AB=13, AC=5 (rect. en C). BC?",choices:["12","8","10","√13"],answer:0,why:"13²=5²+BC²."}], litteral:[{q:"Réduire : 3x+5−2x+1",choices:["x+6","x+4","5x+6","x−4"],answer:0,why:"x+6."}], fractions:[{q:"(3/4)+(1/6)= ?",choices:["11/12","5/10","10/12","13/12"],answer:0,why:"=11/12."}], proportion:[{q:"6 kg → 18 €. 2,5 kg ?",choices:["7,5 €","6 €","9 €","10 €"],answer:0,why:"k=3."}], mesures:[{q:"Aire disque r=5",choices:["25π","10π","50π","5π²"],answer:0,why:"πr²."}] };
function Progress({value,max,color}){const pct=Math.round(100*value/max);return (<div className='progress'><div className='bar' style={{width:`${pct}%`,background:color}}/></div>);} 
function ThemeCard({t,progress,onOpenCourse,onOpenQuiz}){const pr=progress[t.key]||0;const total=BANK[t.key].length;return (<div className='card'><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}><span className='badge' style={{background:t.color}}></span><h3 style={{margin:0}}>{t.title}</h3></div><ul style={{margin:'0 0 10px 18px',color:'var(--muted)'}}>{COURSES[t.key].ideas.slice(0,3).map((l,i)=>(<li key={i}>{l}</li>))}</ul><Progress value={pr} max={total} color={t.color}/><div style={{display:'flex',justifyContent:'space-between',marginTop:10,alignItems:'center'}}><small className='small'>Progression : {pr}/{total}</small><div style={{display:'flex',gap:8}}><button className='btn' onClick={()=>onOpenCourse(t)}>Cours</button><button className='btn' style={{background:t.color,color:'#fff',borderColor:t.color}} onClick={()=>onOpenQuiz(t)}>Quiz</button></div></div></div>);} 
function Section({title,children}){return (<section style={{marginTop:12}}><h5 style={{margin:'0 0 6px',fontWeight:600}}>{title}</h5><div style={{color:'var(--text)'}}>{children}</div></section>);} 
function Lesson({theme}){const t=THEMES.find(x=>x.key===theme);const C=COURSES[theme];const Svg=theme==='thales'?ThalesSVG:theme==='pythagore'?PythagoreSVG:null;return (<div className='card'><div className='svg-wrap'>{Svg? <Svg/>: null}</div><h4 style={{margin:'0 0 6px'}}>Cours — {t.title}</h4><p style={{margin:'0 0 6px',color:'var(--muted)'}}>{C.intro}</p><Section title='Prérequis'><ul style={{margin:'0 0 0 18px'}}>{C.prereq.map((l,i)=>(<li key={i}>{l}</li>))}</ul></Section><Section title='Idées‑clés'><ul style={{margin:'0 0 0 18px'}}>{C.ideas.map((l,i)=>(<li key={i}>{l}</li>))}</ul></Section><Section title='Méthode'><ol style={{margin:'0 0 0 18px'}}>{C.method.map((l,i)=>(<li key={i}>{l}</li>))}</ol></Section><Section title='Exemples corrigés'><div style={{display:'grid',gap:8}}>{C.examples.map((ex,idx)=>(<div key={idx} className='card' style={{padding:12}}><div style={{fontWeight:600,marginBottom:6}}>{ex.title}</div><ul style={{margin:'0 0 6px 18px'}}>{ex.steps.map((s,i)=>(<li key={i}>{s}</li>))}</ul><div><strong>Solution :</strong> {ex.solution.join(' ')}</div></div>))}</div></Section><Section title='Pièges fréquents'><ul style={{margin:'0 0 0 18px'}}>{C.pitfalls.map((l,i)=>(<li key={i}>{l}</li>))}</ul></Section><Section title='À retenir'><ul style={{margin:'0 0 0 18px'}}>{C.recap.map((l,i)=>(<li key={i}>{l}</li>))}</ul></Section><p className='small' style={{marginTop:8}}>Programme : {C.program.join(' · ')}</p><p className='small'>Astuce : pendant le quiz, A/B/C/D et ←/→ au clavier.</p></div>);} 
function Quiz({theme,onExit,onFinish}){const themeObj=THEMES.find(t=>t.key===theme);const questions=BANK[theme];const [i,setI]=useState(0);const [answers,setAnswers]=useState(Array(questions.length).fill(null));const q=questions[i];useEffect(()=>{const onKey=e=>{const m={a:0,b:1,c:2,d:3};const k=e.key.toLowerCase();if(m[k]!=null&&!answers[i]) choose(m[k]);if(k==='arrowright') next();if(k==='arrowleft') prev();};window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey)},[i,answers]);const choose=idx=>{const isOk=idx===q.answer;const next=[...answers];next[i]={choice:idx,isCorrect:isOk};setAnswers(next)};const next=()=>setI(v=>Math.min(v+1,questions.length-1));const prev=()=>setI(v=>Math.max(v-1,0));const done=answers.filter(Boolean).length;const score=answers.filter(a=>a?.isCorrect).length;return (<div className='card'><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}><span className='badge' style={{background:themeObj.color}}></span><h4 style={{margin:0}}>{themeObj.title} — Quiz</h4></div><Progress value={done} max={questions.length} color={themeObj.color}/><p className='small' style={{margin:'8px 0 4px'}}>Question {i+1}/{questions.length}</p><p style={{margin:'0 0 10px'}}>{q.q}</p><div className='grid cols-2'>{q.choices.map((c,idx)=>{const a=answers[i];const picked=a?.choice===idx;const cls=a?(idx===q.answer?'choice ok':picked?'choice bad':'choice'):'choice';return (<button key={idx} className={cls} onClick={()=>choose(idx)} disabled={!!a}><strong style={{marginRight:6}}>{String.fromCharCode(65+idx)}.</strong>{c}</button>);})}</div>{answers[i]&&<div className='card' style={{marginTop:12}}><strong>Correction détaillée</strong><div style={{marginTop:6}}>{q.why}</div></div>}<div style={{display:'flex',justifyContent:'space-between',marginTop:12}}><button className='btn' onClick={prev}>Précédent</button>{i<questions.length-1?<button className='btn-primary' onClick={next}>Suivant</button>:<button className='btn-primary' onClick={()=>{onFinish&&onFinish(); onExit&&onExit();}}>Terminer</button>}</div><div className='footer'>Score provisoire : {score}/{done}</div></div>);} 
function ThemeView({theme,onBack,markDone}){const [tab,setTab]=useState('cours');return (<div className='container' style={{padding:0}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><button className='btn' onClick={onBack}>← Retour</button><div className='tabs'><button className={`tab ${tab==='cours'?'active':''}`} onClick={()=>setTab('cours')}>Cours</button><button className={`tab ${tab==='quiz'?'active':''}`} onClick={()=>setTab('quiz')}>Quiz</button></div></div>{tab==='cours'?<Lesson theme={theme}/>:<Quiz theme={theme} onExit={onBack} onFinish={()=>markDone&&markDone(theme)}/>}</div>);} 
function Dashboard({onStart,progressByTheme}){return (<div className='grid cols-3'>{THEMES.map(t=>(<ThemeCard key={t.key} t={t} progress={progressByTheme||{}} onOpenCourse={()=>onStart(t.key,'cours')} onOpenQuiz={()=>onStart(t.key,'quiz')}/>))}</div>);} 
function App(){const [active,setActive]=useState(null);const [progress,setProgress]=useState({});const start=(theme,tab)=>setActive({theme,tab});const back=()=>setActive(null);const markDone=(theme)=>setProgress(p=>({...p,[theme]:BANK[theme].length}));return (<div><div className='container'><h1>Maths 4e — Cours + Quiz</h1><p className='small'>Thalès · Pythagore · Calcul littéral · Fractions · Proportionnalité · Grandeurs & mesures</p>{!active?(<><Dashboard onStart={start} progressByTheme={progress}/><div className='small' style={{marginTop:12}}>Version claire + cours détaillés. Navigation clavier (A/B/C/D, ← →).</div></>):(<ThemeView theme={active.theme} onBack={back} markDone={markDone}/>)}</div></div>);} 
const root = ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
</script>
</body>
</html>
